                                                                                                                                                                                                                                                                            <style>

                                                                                                                                                                                                                                                                            body::before{

                                                                                                                                                                                                                                                                                radial-gradient(circle at center, rgba(120,0,0,0.08), transparent 56%),

                                                                                                                                                                                                                                                                            body::after{

                                                                                                                                                                                                                                                                                    rgba(255,255,255,0.035),
                                                                                                                                                                                                                                                                                    rgba(255,255,255,0.035) 1px,
                                                                                                                                                                                                                                                                                    transparent 1px,
                                                                                                                                                                                                                                                                                    transparent 3px

                                                                                                                                                                                                                                                                            #noise{

                                                                                                                                                                                                                                                                            pointer-events:none;
                                                                                                                                                                                                                                                                            z-index:998;
                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                            #flicker{

                                                                                                                                                                                                                                                                            inset:0;

                                                                                                                                                                                                                                                                            pointer-events:none;

                                                                                                                                                                                                                                                                            @keyframes bgPulse{

                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                            @keyframes noiseMove{
                                                                                                                                                                                                                                                                            0%{transform:translate(0,0);}

                                                                                                                                                                                                                                                                            90%{transform:translate(-10%,10%);}

                                                                                                                                                                                                                                                                            #description-panel.visible{

                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                            #description-panel::before{
                                                                                                                                                                                                                                                                            content:"";
                                                                                                                                                                                                                                                                            position:absolute;
                                                                                                                                                                                                                                                                            inset:0;
                                                                                                                                                                                                                                                                            background:linear-gradient(
                                                                                                                                                                                                                                                                                120deg,
                                                                                                                                                                                                                                                                                transparent 0%,
                                                                                                                                                                                                                                                                                rgba(255,255,255,0.04) 50%,
                                                                                                                                                                                                                                                                                transparent 100%

                                                                                                                                                                                                                                                                            transform:translateX(-120%);
                                                                                                                                                                                                                                                                            pointer-events:none;
                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                opacity:1;

                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                            #start-screen{
                                                                                                                                                                                                                                                                            position:fixed;
                                                                                                                                                                                                                                                                            inset:0;
                                                                                                                                                                                                                                                                            background:
                                                                                                                                                                                                                                                                                radial-gradient(circle at center, rgba(120,0,0,0.08), transparent 50%),

                                                                                                                                                                                                                                                                            text-transform:uppercase;
                                                                                                                                                                                                                                                                            text-align:center;
                                                                                                                                                                                                                                                                            padding:0 16px;
                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                            @keyframes titleGlitch{
                                                                                                                                                                                                                                                                            0%,100%{
                                                                                                                                                                                                                                                                                transform:none;
                                                                                                                                                                                                                                                                                text-shadow:none;
                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                            1%{
                                                                                                                                                                                                                                                                                transform:translate(-2px,1px);

                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                            2%{
                                                                                                                                                                                                                                                                                transform:none;
                                                                                                                                                                                                                                                                                text-shadow:none;
                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                            40%{ transform:none; }
                                                                                                                                                                                                                                                                            41%{ transform:translate(2px,-1px); }

                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                            .node{
                                                                                                                                                                                                                                                                            cursor:pointer;

                                                                                                                                                                                                                                                                            .node circle{

                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                            font-size:clamp(9px,1vw,12px);
                                                                                                                                                                                                                                                                            letter-spacing:.35em;
                                                                                                                                                                                                                                                                            text-transform:uppercase;
                                                                                                                                                                                                                                                                            transition:.3s;
                                                                                                                                                                                                                                                                            user-select:none;
                                                                                                                                                                                                                                                                            -webkit-user-select:none;
                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                            .node:hover text{
                                                                                                                                                                                                                                                                            fill:white;
                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                            .node.selected text{
                                                                                                                                                                                                                                                                            fill:white;
                                                                                                                                                                                                                                                                            letter-spacing:.55em;
                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                            .link{
                                                                                                                                                                                                                                                                            fill:none;
                                                                                                                                                                                                                                                                            stroke:var(--line);
                                                                                                                                                                                                                                                                            stroke-width:1px;
                                                                                                                                                                                                                                                                            vector-effect:non-scaling-stroke;
                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                            .glitch{
                                                                                                                                                                                                                                                                            animation:screenGlitch .12s linear infinite;
                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                            @keyframes screenGlitch{
                                                                                                                                                                                                                                                                            0%{ transform:translate(0); }
                                                                                                                                                                                                                                                                            20%{ transform:translate(-2px,1px); }
                                                                                                                                                                                                                                                                            40%{ transform:translate(2px,-1px); }
                                                                                                                                                                                                                                                                            60%{ transform:translate(-1px,2px); }
                                                                                                                                                                                                                                                                            80%{ transform:translate(1px,-2px); }
                                                                                                                                                                                                                                                                            100%{ transform:translate(0); }
                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                            <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const data = {
                                                                                                                                                                                                                                                                      name: "ARCHIVE",
                                                                                                                                                                                                                                                                      desc: "There are things hidden beneath the structure.",
                                                                                                                                                                                                                                                                      children: [
                                                                                                                                                                                                                                                                      {
                                                                                                                                                                                                                                                                      name: "ENTRY_01",
                                                                                                                                                                                                                                                                      desc: "They started hearing voices through disconnected radios.",
                                                                                                                                                                                                                                                                      children: [
                                                                                                                                                                                                                                                                      {
                                                                                                                                                                                                                                                                      name: "AUDIO",
                                                                                                                                                                                                                                                                      desc: "The recordings contain frequencies not produced by human instruments."
                                                                                                                                                                                                                                                                      },
                                                                                                                                                                                                                                                                      {
                                                                                                                                                                                                                                                                      name: "ROOM_14",
                                                                                                                                                                                                                                                                      desc: "Every photograph from inside the room develops incorrectly."
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      ]
                                                                                                                                                                                                                                                                      },
                                                                                                                                                                                                                                                                      {
                                                                                                                                                                                                                                                                      name: "SUBJECT",
                                                                                                                                                                                                                                                                      desc: "The witness no longer remembers their own face.",
                                                                                                                                                                                                                                                                      children: [
                                                                                                                                                                                                                                                                      {
                                                                                                                                                                                                                                                                      name: "SLEEP",
                                                                                                                                                                                                                                                                      desc: "They wake up at exactly 3:14 every night."
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      ]
                                                                                                                                                                                                                                                                      },
                                                                                                                                                                                                                                                                      {
                                                                                                                                                                                                                                                                      name: "TRANSMISSION",
                                                                                                                                                                                                                                                                      desc: "The signal repeats endlessly beneath the noise."
                                                                                                                                                                                                                                                                      },
                                                                                                                                                                                                                                                                      {
                                                                                                                                                                                                                                                                      name: "VOID",
                                                                                                                                                                                                                                                                      desc: "Do not follow the voices behind the walls."
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      ]
                                                                                                                                                                                                                                                                      };
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      const width = window.innerWidth;
                                                                                                                                                                                                                                                                      const height = window.innerHeight;
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      let selectedNode = null;
                                                                                                                                                                                                                                                                      let audioStarted = false;
                                                                                                                                                                                                                                                                      let isGlitching = false;
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      const svgRoot = d3.select("#svg-container")
                                                                                                                                                                                                                                                                      .append("svg")
                                                                                                                                                                                                                                                                      .attr("width", "100%")
                                                                                                                                                                                                                                                                      .attr("height", "100%");
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      const zoomLayer = svgRoot.append("g");
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      const zoom = d3.zoom()
                                                                                                                                                                                                                                                                      .scaleExtent([0.4, 3])
                                                                                                                                                                                                                                                                      .on("zoom", (event) => {
                                                                                                                                                                                                                                                                      zoomLayer.attr("transform", event.transform);
                                                                                                                                                                                                                                                                      });
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      svgRoot.call(zoom);
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      const simulation = d3.forceSimulation()
                                                                                                                                                                                                                                                                      .force("link", d3.forceLink().id(d => d.id).distance(window.innerWidth < 768 ? 120 : 180))
                                                                                                                                                                                                                                                                      .force("charge", d3.forceManyBody().strength(window.innerWidth < 768 ? -900 : -1800))
                                                                                                                                                                                                                                                                      .force("center", d3.forceCenter(width / 2, height / 2))
                                                                                                                                                                                                                                                                      .force("collision", d3.forceCollide().radius(40))
                                                                                                                                                                                                                                                                      .on("tick", ticked);
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      let nodes = [];
                                                                                                                                                                                                                                                                      let links = [];
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      function update() {
                                                                                                                                                                                                                                                                      const root = d3.hierarchy(data);
                                                                                                                                                                                                                                                                      nodes = root.descendants();
                                                                                                                                                                                                                                                                      links = root.links();
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      nodes.forEach((d, i) => {
                                                                                                                                                                                                                                                                      d.id = d.id || `node-${i}`;
                                                                                                                                                                                                                                                                      });
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      const link = zoomLayer.selectAll(".link").data(links, d => d.target.id);
                                                                                                                                                                                                                                                                      link.exit().remove();
                                                                                                                                                                                                                                                                      const linkEnter = link.enter().append("path").attr("class", "link");
                                                                                                                                                                                                                                                                      linkEnter.merge(link);
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      const node = zoomLayer.selectAll(".node").data(nodes, d => d.id);
                                                                                                                                                                                                                                                                      node.exit().remove();
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      const nodeEnter = node.enter()
                                                                                                                                                                                                                                                                      .append("g")
                                                                                                                                                                                                                                                                      .attr("class", "node")
                                                                                                                                                                                                                                                                      .call(drag(simulation))
                                                                                                                                                                                                                                                                      .on("click", (event, d) => {
                                                                                                                                                                                                                                                                      event.stopPropagation();
                                                                                                                                                                                                                                                                      triggerNode(d);
                                                                                                                                                                                                                                                                      });
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      nodeEnter.append("circle").attr("r", 4);
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      nodeEnter.append("text")
                                                                                                                                                                                                                                                                      .attr("dy", "-1.7em")
                                                                                                                                                                                                                                                                      .attr("text-anchor", "middle")
                                                                                                                                                                                                                                                                      .text(d => d.data.name);
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      const nodeUpdate = nodeEnter.merge(node);
                                                                                                                                                                                                                                                                      nodeUpdate.classed("selected", d => selectedNode && d.id === selectedNode.id);
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      simulation.nodes(nodes);
                                                                                                                                                                                                                                                                      simulation.force("link").links(links);
                                                                                                                                                                                                                                                                      simulation.alpha(1).restart();
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      function focusNode(d, callback) {
                                                                                                                                                                                                                                                                      const scale = window.innerWidth < 768 ? 1.9 : 2.2;
                                                                                                                                                                                                                                                                      const transform = d3.zoomIdentity
                                                                                                                                                                                                                                                                      .translate(width / 2, height / 2)
                                                                                                                                                                                                                                                                      .scale(scale)
                                                                                                                                                                                                                                                                      .translate(-d.x, -d.y);
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      svgRoot.transition()
                                                                                                                                                                                                                                                                      .duration(850)
                                                                                                                                                                                                                                                                      .ease(d3.easeCubicOut)
                                                                                                                                                                                                                                                                      .call(zoom.transform, transform)
                                                                                                                                                                                                                                                                      .on("end", () => {
                                                                                                                                                                                                                                                                      if (typeof callback === "function") callback();
                                                                                                                                                                                                                                                                      });
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      function triggerNode(d) {
                                                                                                                                                                                                                                                                      if (isGlitching) return;
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      isGlitching = true;
                                                                                                                                                                                                                                                                      selectedNode = d;
                                                                                                                                                                                                                                                                      update();
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      const panel = document.getElementById("description-panel");
                                                                                                                                                                                                                                                                      const content = document.getElementById("description-content");
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      const originalPositions = nodes.map(node => ({
                                                                                                                                                                                                                                                                      node,
                                                                                                                                                                                                                                                                      x: node.x,
                                                                                                                                                                                                                                                                      y: node.y,
                                                                                                                                                                                                                                                                      vx: node.vx,
                                                                                                                                                                                                                                                                      vy: node.vy,
                                                                                                                                                                                                                                                                      fx: node.fx,
                                                                                                                                                                                                                                                                      fy: node.fy
                                                                                                                                                                                                                                                                      }));
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      panel.classList.remove("visible");
                                                                                                                                                                                                                                                                      document.body.classList.add("glitch");
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      const chaos = setInterval(() => {
                                                                                                                                                                                                                                                                      nodes.forEach(node => {
                                                                                                                                                                                                                                                                      node.fx = null;
                                                                                                                                                                                                                                                                      node.fy = null;
                                                                                                                                                                                                                                                                      node.vx = (Math.random() - 0.5) * 12;
                                                                                                                                                                                                                                                                      node.vy = (Math.random() - 0.5) * 12;
                                                                                                                                                                                                                                                                      node.x += (Math.random() - 0.5) * 40;
                                                                                                                                                                                                                                                                      node.y += (Math.random() - 0.5) * 40;
                                                                                                                                                                                                                                                                      });
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      simulation.alpha(0.18).restart();
                                                                                                                                                                                                                                                                      }, 40);
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      setTimeout(() => {
                                                                                                                                                                                                                                                                      clearInterval(chaos);
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      originalPositions.forEach(p => {
