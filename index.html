                                                                                                                                                                                                                                                                      p.node.x = p.x;
                                                                                                                                                                                                                                                                      p.node.y = p.y;
                                                                                                                                                                                                                                                                      p.node.vx = 0;
                                                                                                                                                                                                                                                                      p.node.vy = 0;
                                                                                                                                                                                                                                                                      p.node.fx = null;
                                                                                                                                                                                                                                                                      p.node.fy = null;
                                                                                                                                                                                                                                                                      });
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      simulation.alpha(0.6).restart();
                                                                                                                                                                                                                                                                      document.body.classList.remove("glitch");
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      focusNode(d, () => {
                                                                                                                                                                                                                                                                      content.innerHTML = marked.parse(d.data.desc || "");
                                                                                                                                                                                                                                                                      panel.classList.remove("visible");
                                                                                                                                                                                                                                                                      void panel.offsetWidth;
                                                                                                                                                                                                                                                                      panel.classList.add("visible");
                                                                                                                                                                                                                                                                      isGlitching = false;
                                                                                                                                                                                                                                                                      });
                                                                                                                                                                                                                                                                      }, 450);
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      function ticked() {
                                                                                                                                                                                                                                                                      zoomLayer.selectAll(".link")
                                                                                                                                                                                                                                                                      .attr("d", d => {
                                                                                                                                                                                                                                                                      return `M${d.source.x},${d.source.y} C${d.source.x},${(d.source.y + d.target.y) / 2} ${d.target.x},${(d.source.y + d.target.y) / 2} ${d.target.x},${d.target.y}`;
                                                                                                                                                                                                                                                                      });
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      zoomLayer.selectAll(".node")
                                                                                                                                                                                                                                                                      .attr("transform", d => `translate(${d.x},${d.y})`);
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      function drag(simulation) {
                                                                                                                                                                                                                                                                      function dragstarted(event, d) {
                                                                                                                                                                                                                                                                      if (!event.active) simulation.alphaTarget(0.3).restart();
                                                                                                                                                                                                                                                                      d.fx = d.x;
                                                                                                                                                                                                                                                                      d.fy = d.y;
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      function dragged(event, d) {
                                                                                                                                                                                                                                                                      d.fx = event.x;
                                                                                                                                                                                                                                                                      d.fy = event.y;
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      function dragended(event, d) {
                                                                                                                                                                                                                                                                      if (!event.active) simulation.alphaTarget(0);
                                                                                                                                                                                                                                                                      d.fx = null;
                                                                                                                                                                                                                                                                      d.fy = null;
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      return d3.drag()
                                                                                                                                                                                                                                                                      .on("start", dragstarted)
                                                                                                                                                                                                                                                                      .on("drag", dragged)
                                                                                                                                                                                                                                                                      .on("end", dragended);
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      let audioContext;
                                                                                                                                                                                                                                                                      let analyser;
                                                                                                                                                                                                                                                                      let dataArray;
                                                                                                                                                                                                                                                                      let bufferLength;
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      async function startExperience() {
                                                                                                                                                                                                                                                                      const screen = document.getElementById("start-screen");
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      try {
                                                                                                                                                                                                                                                                      if (!document.fullscreenElement) {
                                                                                                                                                                                                                                                                      await document.documentElement.requestFullscreen({ navigationUI: "hide" });
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      } catch (err) {
                                                                                                                                                                                                                                                                      console.log("Fullscreen request blocked:", err);
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      screen.style.opacity = "0";
                                                                                                                                                                                                                                                                      setTimeout(() => {
                                                                                                                                                                                                                                                                      screen.style.display = "none";
                                                                                                                                                                                                                                                                      }, 1800);
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      const player = document.getElementById("audio-player");
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      try {
                                                                                                                                                                                                                                                                      audioContext = new (window.AudioContext || window.webkitAudioContext)();
                                                                                                                                                                                                                                                                      analyser = audioContext.createAnalyser();
                                                                                                                                                                                                                                                                      analyser.fftSize = 128;
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      bufferLength = analyser.frequencyBinCount;
                                                                                                                                                                                                                                                                      dataArray = new Uint8Array(bufferLength);
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      const source = audioContext.createMediaElementSource(player);
                                                                                                                                                                                                                                                                      source.connect(analyser);
                                                                                                                                                                                                                                                                      analyser.connect(audioContext.destination);
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      await player.play();
                                                                                                                                                                                                                                                                      audioStarted = true;
                                                                                                                                                                                                                                                                      animate();
                                                                                                                                                                                                                                                                      } catch (err) {
                                                                                                                                                                                                                                                                      console.log(err);
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      document.getElementById("start-screen").addEventListener("click", startExperience);
                                                                                                                                                                                                                                                                      document.getElementById("start-screen").addEventListener("touchstart", startExperience, { passive: true });
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      setInterval(() => {
                                                                                                                                                                                                                                                                      if (isGlitching) return;
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      if (Math.random() > 0.75) {
                                                                                                                                                                                                                                                                      document.body.classList.add("glitch");
                                                                                                                                                                                                                                                                      setTimeout(() => document.body.classList.remove("glitch"), 80);
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      }, 3000);
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      function animate() {
                                                                                                                                                                                                                                                                      if (!audioStarted) return;
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      requestAnimationFrame(animate);
                                                                                                                                                                                                                                                                      analyser.getByteFrequencyData(dataArray);
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      let sum = 0;
                                                                                                                                                                                                                                                                      for (let i = 0; i < bufferLength; i++) {
                                                                                                                                                                                                                                                                      sum += dataArray[i];
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      const average = sum / bufferLength;
                                                                                                                                                                                                                                                                      const pulse = 1 + (average / 255) * 0.4;
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      zoomLayer.selectAll(".node circle")
                                                                                                                                                                                                                                                                      .attr("r", d => ((selectedNode && d.id === selectedNode.id) ? 8 : 4) * pulse)
                                                                                                                                                                                                                                                                      .style("opacity", 0.4 + (average / 255) * 0.6);
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      zoomLayer.selectAll(".link")
                                                                                                                                                                                                                                                                      .style("stroke-opacity", 0.08 + (average / 255) * 0.5);
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      window.addEventListener("resize", () => {
                                                                                                                                                                                                                                                                      simulation.force("center", d3.forceCenter(window.innerWidth / 2, window.innerHeight / 2));
                                                                                                                                                                                                                                                                      simulation.alpha(1).restart();
                                                                                                                                                                                                                                                                      });
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      document.addEventListener("contextmenu", e => e.preventDefault());
                                                                                                                                                                                                                                                                      document.addEventListener("selectstart", e => e.preventDefault());
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      document.addEventListener("keydown", e => {
                                                                                                                                                                                                                                                                      const key = e.key.toLowerCase();
                                                                                                                                                                                                                                                                      const ctrl = e.ctrlKey || e.metaKey;
                                                                                                                                                                                                                                                                      const shift = e.shiftKey;
                                                                                                                                                                                                                                                                      const alt = e.altKey;
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      if (key === "f12") {
                                                                                                                                                                                                                                                                      e.preventDefault();
                                                                                                                                                                                                                                                                      return;
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      if (ctrl && shift && ["i", "j", "c"].includes(key)) {
                                                                                                                                                                                                                                                                      e.preventDefault();
                                                                                                                                                                                                                                                                      return;
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      if (ctrl && key === "u") {
                                                                                                                                                                                                                                                                      e.preventDefault();
                                                                                                                                                                                                                                                                      return;
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      if (ctrl && shift && key === "m") {
                                                                                                                                                                                                                                                                      e.preventDefault();
                                                                                                                                                                                                                                                                      return;
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      if (alt && key === "f") {
                                                                                                                                                                                                                                                                      e.preventDefault();
                                                                                                                                                                                                                                                                      return;
                                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                                      });
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                      update();
                                                                                                                                                                                                                                                                                                                        </script>
                                                                                                                                                                                                                                                                                                                        </body>
                                                                                                                                                                                                                                                                                                                        </html>
